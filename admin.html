<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản trị đề thi - LMS Mini</title>
    <style>
        body { font-family: system-ui; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f5f7fb; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin-top: 12px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; }
        .checkbox-group { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 8px; }
        .checkbox-group label { display: inline-flex; align-items: center; gap: 5px; font-weight: normal; margin-top: 0; }
        button { background: #1e3c72; color: white; padding: 10px 20px; border: none; border-radius: 8px; margin-top: 20px; cursor: pointer; }
        button.danger { background: #c0392b; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #e2e8f0; }
        .warning { background: #fff3cd; padding: 12px; border-radius: 8px; margin-top: 15px; }
        .success { background: #d4edda; padding: 12px; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>
<h1>🛠 Quản trị kho đề</h1>

<div class="card">
    <h2>📋 Danh sách đề hiện có (trong bộ nhớ)</h2>
    <div id="examList">Đang tải...</div>
    <div style="margin-top: 10px;">
        <button id="refreshListBtn">🔄 Làm mới từ exams.json</button>
        <button id="downloadJsonBtn">💾 Tải exams.json hiện tại về máy</button>
    </div>
</div>

<div class="card">
    <h2>➕ Thêm đề mới (giữ nguyên đề cũ)</h2>
    <label>Tiêu đề *</label>
    <input type="text" id="title" placeholder="VD: Ôn tập Hàm số">

    <label>Lớp áp dụng * (chọn một hoặc nhiều)</label>
    <div class="checkbox-group" id="classCheckboxes">
        <label><input type="checkbox" value="11A4"> 11A4</label>
        <label><input type="checkbox" value="11A5"> 11A5</label>
        <label><input type="checkbox" value="11A6"> 11A6</label>
        <label><input type="checkbox" value="11A7"> 11A7</label>
        <label><input type="checkbox" value="12A1"> 12A1</label>
        <label><input type="checkbox" value="12A2"> 12A2</label>
    </div>

    <label>Tuần (VD: 2026-W01)</label>
    <input type="text" id="week" placeholder="2026-W01">

    <label>Ngày mở (YYYY-MM-DD) *</label>
    <input type="date" id="open">

    <label>Ngày đóng (YYYY-MM-DD) *</label>
    <input type="date" id="close">

    <label>ID đề (không dấu cách, VD: de003) *</label>
    <input type="text" id="id" placeholder="de003">

    <label>Chọn file HTML đề *</label>
    <input type="file" id="htmlFile" accept=".html">

    <button id="addBtn">➕ Thêm đề (tạo exams.json mới bao gồm cũ + mới)</button>
    <div class="warning">⚠️ Sau khi nhấn nút, bạn sẽ tải về file <strong>exams.json</strong>. Hãy upload file này lên GitHub (ghi đè file cũ) và upload file HTML đề. Các đề cũ vẫn được giữ nguyên trong file mới.</div>
</div>

<script>
    let currentExams = [];

    async function loadExams() {
        try {
            const res = await fetch("exams.json?v=" + Date.now());
            if (res.ok) {
                currentExams = await res.json();
                if (!Array.isArray(currentExams)) currentExams = [];
            } else {
                currentExams = [];
            }
        } catch(e) {
            currentExams = [];
        }
        renderExamList();
    }

    function renderExamList() {
        const container = document.getElementById("examList");
        if (!currentExams.length) {
            container.innerHTML = "<p>Chưa có đề nào. Hãy thêm đề mới.</p>";
            return;
        }
        let html = `<table>
            <thead><tr><th>ID</th><th>Tiêu đề</th><th>Lớp</th><th>Tuần</th><th>Mở</th><th>Đóng</th><th>File HTML</th><th>Thao tác</th></tr>
            </thead>
            <tbody>`;
        currentExams.forEach((ex, index) => {
            html += `<tr>
                <td>${ex.id}</td>
                <td>${ex.title}</td>
                <td>${ex.class}</td>
                <td>${ex.week || ''}</td>
                <td>${ex.open}</td>
                <td>${ex.close}</td>
                <td>${ex.html}</td>
                <td><button class="deleteBtn" data-index="${index}">🗑️ Xóa</button></td>
            </tr>`;
        });
        html += `</tbody></table><p class="success">✅ Tổng số đề: ${currentExams.length}</p>`;
        container.innerHTML = html;
        // Gắn sự kiện xóa
        document.querySelectorAll('.deleteBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-index'));
                if (confirm(`Xóa đề "${currentExams[idx].title}" (lớp ${currentExams[idx].class})?`)) {
                    currentExams.splice(idx, 1);
                    renderExamList();
                }
            });
        });
    }

    // Tải file exams.json hiện tại (theo dữ liệu trong bộ nhớ)
    function downloadExamsJson() {
        if (!currentExams.length) {
            alert("Chưa có dữ liệu đề. Hãy làm mới từ file trước.");
            return;
        }
        const jsonStr = JSON.stringify(currentExams, null, 2);
        const blob = new Blob([jsonStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "exams.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert("Đã tải file exams.json xuống. Hãy upload lên GitHub để thay thế.");
    }

    document.getElementById("refreshListBtn").onclick = () => loadExams();
    document.getElementById("downloadJsonBtn").onclick = () => downloadExamsJson();

    document.getElementById("addBtn").onclick = async () => {
        const title = document.getElementById("title").value.trim();
        const week = document.getElementById("week").value.trim();
        const open = document.getElementById("open").value;
        const close = document.getElementById("close").value;
        const id = document.getElementById("id").value.trim();
        const htmlFile = document.getElementById("htmlFile").files[0];

        const selectedClasses = Array.from(document.querySelectorAll('#classCheckboxes input:checked')).map(cb => cb.value);
        if (selectedClasses.length === 0) {
            alert("Vui lòng chọn ít nhất một lớp.");
            return;
        }
        if (!title || !open || !close || !id || !htmlFile) {
            alert("Vui lòng điền đầy đủ thông tin (có dấu *).");
            return;
        }

        // Kiểm tra trùng ID với bất kỳ đề nào trong currentExams (cả cũ lẫn mới sẽ thêm)
        const existingIds = currentExams.map(ex => ex.id);
        // Với mỗi lớp, tạo id riêng (id_class). Nếu bị trùng thì báo.
        const newIds = selectedClasses.map(cls => id + "_" + cls);
        const conflict = newIds.find(nid => existingIds.includes(nid));
        if (conflict) {
            alert(`ID ${conflict} đã tồn tại. Hãy đổi ID khác hoặc xóa đề cũ trước.`);
            return;
        }

        const htmlFileName = htmlFile.name;
        // Tạo danh sách đề mới cho từng lớp
        const newExams = selectedClasses.map(cls => ({
            id: id + "_" + cls,
            title: title,
            week: week,
            class: cls,
            open: open,
            close: close,
            html: htmlFileName
        }));

        // Gộp với cũ
        const updatedExams = [...currentExams, ...newExams];
        
        // Xuất file
        const jsonStr = JSON.stringify(updatedExams, null, 2);
        const blob = new Blob([jsonStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "exams.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        alert(`✅ Đã tạo file exams.json với ${updatedExams.length} đề (cũ: ${currentExams.length}, mới: ${newExams.length}).\nHãy tải file này lên GitHub (ghi đè) và upload file HTML "${htmlFileName}".`);
        
        // Cập nhật bộ nhớ và giao diện
        currentExams = updatedExams;
        renderExamList();
        
        // Reset form
        document.getElementById("title").value = "";
        document.getElementById("week").value = "";
        document.getElementById("open").value = "";
        document.getElementById("close").value = "";
        document.getElementById("id").value = "";
        document.getElementById("htmlFile").value = "";
        document.querySelectorAll('#classCheckboxes input:checked').forEach(cb => cb.checked = false);
    };

    // Khởi tạo
    loadExams();
</script>
</body>
</html>
